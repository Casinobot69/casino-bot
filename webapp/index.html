<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎰 PVP Casino</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1e;
    --surface2: #242428;
    --border: #2e2e35;
    --text: #ffffff;
    --text2: #8b8b9a;
    --accent: #5865f2;
    --gold: #f6c90e;
    --green: #23d160;
    --red: #ff4757;
    --radius: 16px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-balance {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: 20px; padding: 6px 12px;
    font-weight: 700; font-size: 15px; cursor: pointer;
    border: 1px solid var(--border); transition: all .2s;
  }
  .header-balance:hover { border-color: var(--gold); }
  .header-balance .star { font-size: 16px; }
  .header-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--surface2);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: all .2s;
  }
  .header-btn:hover { background: var(--border); }
  .header-plus {
    width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    font-size: 18px; font-weight: 700; color: white; margin-left: 4px;
    transition: transform .2s;
  }
  .header-plus:hover { transform: scale(1.1); }

  /* WHEEL AREA */
  .wheel-area {
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 10px;
    flex-shrink: 0;
  }

  /* POINTER */
  .pointer-wrap {
    position: relative; display: flex; justify-content: center; margin-bottom: 0;
  }
  .pointer {
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 20px solid #fff;
    filter: drop-shadow(0 2px 8px rgba(255,255,255,0.3));
    z-index: 10; margin-bottom: -4px;
  }

  canvas#wheelCanvas {
    display: block;
    max-width: 320px;
    max-height: 320px;
    width: 100%;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
  }

  /* GAME INFO BAR */
  .game-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; gap: 8px;
  }
  .game-bar-btn {
    width: 40px; height: 40px; background: var(--surface2);
    border-radius: 50%; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .game-bar-btn:hover { background: var(--border); }
  .bank-display {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border-radius: 24px; padding: 10px 20px;
    font-weight: 700; font-size: 16px; gap: 6px;
    border: 1px solid var(--border);
  }
  .bank-display .star { color: var(--gold); font-size: 16px; }

  /* GAME PANEL */
  .game-panel {
    margin: 0 12px 8px;
    background: var(--surface2); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
    flex-shrink: 0;
  }
  .game-panel-header {
    padding: 8px 16px; text-align: center;
    font-size: 12px; color: var(--text2); letter-spacing: .5px;
  }
  .player-row {
    display: flex; align-items: center; padding: 10px 16px; gap: 12px;
    border-top: 1px solid var(--border); transition: background .2s;
  }
  .player-row:hover { background: rgba(255,255,255,0.03); }
  .player-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
    border: 2px solid transparent; overflow: hidden;
  }
  .player-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .player-info { flex: 1; }
  .player-name { font-weight: 600; font-size: 14px; }
  .player-chance { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .player-bet { font-weight: 700; font-size: 14px; color: var(--gold); display: flex; align-items: center; gap: 3px; }
  .game-hash { padding: 6px 16px 8px; text-align: center; font-size: 11px; color: #444; letter-spacing: .3px; }

  /* BET BUTTONS */
  .bet-section { padding: 0 12px 12px; }
  .bet-buttons {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;
  }
  .bet-btn {
    padding: 12px 0; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--text); font-weight: 700; font-size: 13px;
    cursor: pointer; transition: all .2s; display: flex;
    align-items: center; justify-content: center; gap: 4px;
  }
  .bet-btn:hover { border-color: var(--gold); background: rgba(246,201,14,0.08); color: var(--gold); }
  .bet-btn.active { border-color: var(--gold); background: rgba(246,201,14,0.15); color: var(--gold); }
  .bet-btn .bstar { font-size: 14px; }

  .play-btn {
    width: 100%; padding: 16px; background: linear-gradient(135deg, #5865f2, #7c4dff);
    border: none; border-radius: 14px; color: white;
    font-weight: 700; font-size: 16px; cursor: pointer;
    transition: all .2s; letter-spacing: .3px;
  }
  .play-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(88,101,242,0.4); }
  .play-btn:active { transform: translateY(0); }
  .play-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 85vh; overflow-y: auto;
    transform: translateY(100%); transition: transform .35s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding: 24px 20px 40px;
  }
  .modal-overlay.active .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 20px; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text2);
  }

  /* NFT GRID */
  .nft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .nft-item {
    background: var(--surface2); border-radius: 14px; padding: 14px 10px;
    text-align: center; border: 1px solid var(--border); cursor: pointer;
    transition: all .2s;
  }
  .nft-item:hover { border-color: var(--gold); transform: translateY(-2px); }
  .nft-emoji { font-size: 36px; margin-bottom: 8px; display: block; }
  .nft-price { font-size: 12px; font-weight: 700; color: var(--gold); display: flex; align-items: center; justify-content: center; gap: 2px; }

  /* WINNER OVERLAY */
  .winner-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2000; opacity: 0; pointer-events: none; transition: opacity .5s;
  }
  .winner-overlay.active { opacity: 1; pointer-events: all; }
  .winner-content { text-align: center; padding: 24px; animation: popIn .5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .winner-trophy { font-size: 80px; margin-bottom: 16px; animation: bounce 1s infinite; }
  .winner-name { font-size: 28px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
  .winner-amount { font-size: 22px; font-weight: 700; color: white; margin-bottom: 24px; }
  .winner-nft { background: linear-gradient(135deg, #6c5ce7, #a29bfe); padding: 16px 24px; border-radius: 16px; margin-bottom: 20px; }
  .winner-nft-emoji { font-size: 48px; }
  .winner-nft-text { font-size: 14px; color: rgba(255,255,255,0.8); }
  .winner-btn {
    padding: 14px 32px; background: var(--gold);
    border: none; border-radius: 14px; color: #1a1a1e;
    font-weight: 800; font-size: 16px; cursor: pointer; transition: all .2s;
  }
  .winner-btn:hover { transform: scale(1.05); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: all .3s; z-index: 3000; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 1999;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .status-bar {
    text-align: center; padding: 6px; font-size: 12px;
    color: var(--text2); background: var(--surface);
    border-radius: 8px; margin: 0 12px 8px;
  }
  .status-bar.connected { color: var(--green); }
  .status-bar.waiting { color: var(--gold); }
  .status-bar.spinning { color: #a29bfe; }
  .status-bar.disconnected { color: var(--red); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">

      <div class="winner-nft-emoji" id="winnerNftEmoji"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();
tg?.setHeaderColor('#0e0e0f');
tg?.setBackgroundColor('#0e0e0f');

const API = window.location.origin;
const WS_PROTO = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_BASE = `${WS_PROTO}//${window.location.host}`;

// State
let state = {
  user: null,
  balance: 0,
  selectedBet: 100,
  roomId: null,
  ws: null,
  players: [],
  totalBank: 0,
  gameStatus: 'waiting',
  timeLeft: 0,
  isInGame: false,
  animFrame: null,
  wheelRotation: 0,
  isSpinning: false,
};

const COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#C3A6FF','#FFD93D','#6BCB77','#FF8CC8'];

// ─── INIT ───────────────────────────────────────────────
async function init() {
  const tgUser = tg?.initDataUnsafe?.user;
  if (!tgUser) {
    showToast('❌ Telegram\'dan oching!');
    return;
  }
  try {
    const resp = await api('POST', '/api/user/register', {
      telegram_id: tgUser.id,
      username: tgUser.username || '',
      first_name: tgUser.first_name || '',
      last_name: tgUser.last_name || '',
      photo_url: tgUser.photo_url || '',
    });
    state.user = resp.user;
    state.balance = resp.user.balance;
    updateBalanceDisplay();
    loadPrizes();
    drawWheel();
    updateStatusBar('waiting', '👥 O\'yin xonasini kutmoqda...');
  } catch(e) {
    showToast('❌ Xato: ' + e.message);
  }
}

// ─── API HELPER ──────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: 'Server xatosi' }));
    throw new Error(err.detail || 'Xato');
  }
  return r.json();
}

// ─── WHEEL DRAWING ───────────────────────────────────────
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

function drawWheel(rotation = state.wheelRotation) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(cx, cy) - 10;
  const innerR = R * 0.36;

  ctx.clearRect(0, 0, W, H);

  const players = state.players;

  if (!players || players.length === 0) {
    // Empty wheel
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, 2 * Math.PI);
    ctx.fillStyle = '#2a2a30';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
    ctx.fillStyle = '#1a1a1e';
    ctx.fill();
    ctx.fillStyle = '#555';
    ctx.font = `bold ${R * 0.15}px Inter`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('O\'yinchi', cx, cy - 12);
    ctx.fillText('kutilmoqda...', cx, cy + 12);
    return;
  }

  const total = players.reduce((s, p) => s + p.bet, 0);
  let angle = rotation - Math.PI / 2;

  // Draw sectors
  players.forEach((p, i) => {
    const slice = (p.bet / total) * 2 * Math.PI;
    const color = COLORS[i % COLORS.length];

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Sector border
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, angle, angle + slice);
    ctx.closePath();
    ctx.strokeStyle = '#0e0e0f';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Avatar circle
    if (slice > 0.3) {
      const mid = angle + slice / 2;
      const ax = cx + R * 0.68 * Math.cos(mid);
      const ay = cy + R * 0.68 * Math.sin(mid);
      const avR = Math.min(22, R * 0.13);

      ctx.beginPath();
      ctx.arc(ax, ay, avR, 0, 2 * Math.PI);
      ctx.fillStyle = darkenColor(color, 40);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const initials = (p.first_name || p.username || '?')[0].toUpperCase();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${avR * 0.9}px Inter`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(initials, ax, ay);
    }

    angle += slice;
  });

  // Inner circle (dark)
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR);
  grad.addColorStop(0, '#242428');
  grad.addColorStop(1, '#1a1a1e');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center text (timer or count)
  ctx.fillStyle = '#fff';
  const centerText = state.gameStatus === 'betting'
    ? String(state.timeLeft)
    : String(state.players.length);
  ctx.font = `bold ${innerR * 0.7}px Inter`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(centerText, cx, cy);
}

function darkenColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - amount);
  const g = Math.max(0, ((num >> 8) & 0xff) - amount);
  const b = Math.max(0, (num & 0xff) - amount);
  return `rgb(${r},${g},${b})`;
}

// ─── SPIN ANIMATION ──────────────────────────────────────
function spinWheel(targetAngleRad, duration, onComplete) {
  state.isSpinning = true;
  const startRotation = state.wheelRotation;
  const extraRotations = Math.PI * 2 * 8; // 8 full spins
  const totalAngle = extraRotations + targetAngleRad;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOutCubic(progress);
    state.wheelRotation = startRotation + totalAngle * eased;
    drawWheel(state.wheelRotation);

    if (progress < 1) {
      state.animFrame = requestAnimationFrame(animate);
    } else {
      state.isSpinning = false;
      onComplete && onComplete();
    }
  }
  state.animFrame = requestAnimationFrame(animate);
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// ─── WEBSOCKET ───────────────────────────────────────────
function connectWS(roomId) {
  if (state.ws) state.ws.close();
  state.roomId = roomId;
  const userId = state.user?.telegram_id;
  const wsUrl = `${WS_BASE}/api/game/ws/${roomId}?telegram_id=${userId}`;
  state.ws = new WebSocket(wsUrl);

  state.ws.onopen = () => updateStatusBar('connected', '🟢 Ulandi');
  state.ws.onclose = () => {
    updateStatusBar('disconnected', '🔴 Uzildi');
    setTimeout(() => state.roomId && connectWS(state.roomId), 3000);
  };
  state.ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleWSMessage(msg);
  };
}

function handleWSMessage(msg) {
  switch(msg.action) {
    case 'connected':
    case 'player_joined':
    case 'timer':
      state.players = msg.players || [];
      state.totalBank = msg.total_bank || 0;
      state.gameStatus = msg.status || 'waiting';
      state.timeLeft = msg.time_left || 0;
      updateUI(msg);
      break;
    case 'spin_start':
      state.gameStatus = 'spinning';
      state.players = msg.players || [];
      updateStatusBar('spinning', '🎡 Aylanmoqda...');
      updatePlayersList();
      document.getElementById('playBtn').disabled = true;
      const targetAngle = (msg.target_angle || 0) * Math.PI / 180;
      spinWheel(targetAngle, msg.spin_duration || 5000, () => {});
      break;
    case 'game_over':
      handleGameOver(msg);
      break;
    case 'chat':
      break;
  }
}

function updateUI(msg) {
  updateBalanceDisplay();
  updateBankDisplay();
  updatePlayersList();
  updateGameId(msg.room_id, msg.game_hash);
  drawWheel();
  if (msg.status === 'betting') {
    updateStatusBar('waiting', `⏳ ${msg.time_left}s qoldi...`);
    document.getElementById('playBtn').disabled = state.isInGame;
  } else if (msg.status === 'waiting') {
    updateStatusBar('connected', '👥 O\'yinchi kutilmoqda...');
  }
}

function handleGameOver(msg) {
  state.gameStatus = 'finished';
  state.isInGame = false;

  const winner = msg.winner;
  const myId = state.user?.telegram_id;
  const isWinner = winner?.telegram_id === myId;

  if (isWinner) {
    state.balance += msg.winner_amount || 0;
    updateBalanceDisplay();
  }

  setTimeout(() => {
    showWinner(winner, msg.winner_amount, msg.nft_prize, isWinner);
    launchConfetti();
  }, 500);

  // Reset room after a delay
  setTimeout(() => {
    state.players = [];
    state.roomId = null;
    state.isInGame = false;
    state.gameStatus = 'waiting';
    state.totalBank = 0;
    state.wheelRotation = 0;
    drawWheel();
    updatePlayersList();
    updateBankDisplay();
    document.getElementById('playBtn').disabled = false;
    document.getElementById('playBtn').textContent = '🎮 Stavka qo\'yish';
    updateStatusBar('connected', '👥 Yangi o\'yin kutilmoqda...');
  }, 8000);
}

// ─── BET ─────────────────────────────────────────────────
function selectBet(amount) {
  state.selectedBet = amount;
  [100, 500, 2500].forEach(b => {
    document.getElementById(`bet${b}`).classList.toggle('active', b === amount);
  });
}

async function placeBet() {
  if (!state.user) return showToast('❌ Avval kirish kerak');
  if (state.isInGame) return showToast('⚠️ Allaqachon o\'yindasiz!');
  if (state.balance < state.selectedBet) {
    showToast('💸 Balansingiz yetarli emas!');
    return;
  }
  const btn = document.getElementById('playBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Kutmoqda...';
  try {
    const resp = await api('POST', '/api/game/join', {
      telegram_id: state.user.telegram_id,
      room_id: state.roomId,
      bet: state.selectedBet,
    });
    state.balance -= state.selectedBet;
    updateBalanceDisplay();
    state.isInGame = true;
    state.roomId = resp.room_id;
    state.players = resp.room.players || [];
    state.totalBank = resp.room.total_bank || 0;
    state.gameStatus = resp.room.status;
    state.timeLeft = resp.room.time_left;
    updatePlayersList();
    updateBankDisplay();
    updateGameId(resp.room_id, resp.room.game_hash);
    drawWheel();
    connectWS(resp.room_id);
    btn.textContent = '✅ Kirdiniz!';
    showToast(`✅ ⭐${state.selectedBet} stavka qo'yildi!`);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '🎮 Stavka qo\'yish';
    showToast('❌ ' + e.message);
  }
}

// ─── UI UPDATES ──────────────────────────────────────────
function updateBalanceDisplay() {
  document.getElementById('balanceDisplay').textContent = (state.balance || 0).toLocaleString();
}
function updateBankDisplay() {
  document.getElementById('bankDisplay').textContent = (state.totalBank || 0).toLocaleString();
}
function updateGameId(roomId, hash) {
  if (roomId) {
    const shortId = roomId.replace('game_', '').slice(-6);
    document.getElementById('gameId').textContent = `Game #${shortId}`;
    if (hash) document.getElementById('gameHash').textContent = `Game hash: ${hash.slice(0,4)}...${hash.slice(-4)}`;
  }
}
function updatePlayersList() {
  const el = document.getElementById('playersList');
  if (!state.players || state.players.length === 0) {
    el.innerHTML = `<div style="padding:20px;text-align:center;color:#555;font-size:13px">👥 O'yinchilar yo'q. Birinchi bo'lib qo'shiling!</div>`;
    return;
  }
  const total = state.players.reduce((s, p) => s + p.bet, 0);
  el.innerHTML = state.players.map((p, i) => {
    const chance = total > 0 ? (p.bet / total * 100).toFixed(2) : 0;
    const initials = (p.first_name || p.username || '?')[0].toUpperCase();
    const color = COLORS[i % COLORS.length];
    return `
      <div class="player-row">
        <div class="player-avatar" style="background:${color}20;border-color:${color}">
          ${p.photo_url ? `<img src="${p.photo_url}" alt="${initials}">` : `<span style="color:${color}">${initials}</span>`}
        </div>
        <div class="player-info">
          <div class="player-name">${escHtml(p.first_name || p.username || 'O\'yinchi')}</div>
          <div class="player-chance">Шанс ${chance}%</div>
        </div>
        <div class="player-bet">⭐ ${p.bet.toLocaleString()}</div>
      </div>`;
  }).join('');
}
function updateStatusBar(type, text) {
  const el = document.getElementById('statusBar');
  el.className = `status-bar ${type}`;
  el.textContent = text;
}

// ─── PRIZES ──────────────────────────────────────────────
async function loadPrizes() {
  try {
    const data = await api('GET', '/api/game/nft-prizes');
    const grid = document.getElementById('nftGrid');
    grid.innerHTML = data.prizes.map(p => `
      <div class="nft-item">
        <span class="nft-emoji">${p.emoji}</span>
        <div class="nft-price">⭐ ${p.price.toLocaleString()}</div>
      </div>`).join('');
  } catch(e) {}
}

function showPrizes() { document.getElementById('prizesModal').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function showHistory() {
  document.getElementById('historyModal').classList.add('active');
  try {
    const data = await api('GET', '/api/game/history');
    const el = document.getElementById('historyList');
    if (!data.games.length) {
      el.innerHTML = '<div style="text-align:center;color:#555;padding:20px">Tarix bo\'sh</div>';
      return;
    }
    el.innerHTML = data.games.map(g => `
      <div style="background:#242428;border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1px solid #2e2e35">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-weight:700;font-size:13px">#${String(g.room_id).slice(-6)}</span>
          <span style="color:#f6c90e;font-size:13px">⭐ ${(g.total_bank||0).toLocaleString()}</span>
        </div>
        <div style="font-size:12px;color:#666">${g.created_at?.slice(0,16)||''}</div>
      </div>`).join('');
  } catch(e) {}
}

async function showDeposit() {
  showToast('💳 /deposit komandasi bilan to\'ldiring');
}

// ─── WINNER ──────────────────────────────────────────────
function showWinner(winner, amount, nft, isMe) {
  const overlay = document.getElementById('winnerOverlay');
  const name = isMe ? '🎉 SИЗНИ ОМAD!' : (winner?.first_name || 'O\'yinchi');
  document.getElementById('winnerName').textContent = isMe ? '🏆 SIZNI OMAD!' : `G'OLIB: ${name}`;
  document.getElementById('winnerAmount').textContent = `⭐ ${(amount||0).toLocaleString()} Stars`;

  if (nft) {
    document.getElementById('winnerNft').style.display = 'block';
    document.getElementById('winnerNftEmoji').textContent = nft.emoji;
    document.getElementById('winnerNftName').textContent = nft.name;
  } else {
    document.getElementById('winnerNft').style.display = 'none';
  }
  overlay.classList.add('active');
}

function closeWinner() {
  document.getElementById('winnerOverlay').classList.remove('active');
}

// ─── CONFETTI ────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#f6c90e','#5865f2','#23d160','#ff4757','#a29bfe','#fd79a8'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${6+Math.random()*8}px;
        height:${6+Math.random()*8}px;
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration:${2+Math.random()*2}s;
        animation-delay:${Math.random()*0.5}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// ─── TOAST ───────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
});

// Start
init();
</script>
