<html lang="uz">
<head>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root, .theme-classic {
    --bg: #090a0f;
    --surface: #10121a;
    --surface2: #181b26;
    --surface3: #222636;
    --border: #292d3e;
    --text: #ffffff;
    --text2: #9299a9;
    --accent: #5865f2;
    --accent-glow: rgba(88,101,242,0.3);
    --gold: #ffa500;
    --gold-glow: rgba(255,165,0,0.3);
    --green: #2ed573;
    --red: #ff4757;
    --radius: 18px;
  }
  .theme-luxury {
    --bg: #0b0b0c;
    --surface: #121215;
    --surface2: #1b1b1f;
    --surface3: #25252b;
    --border: #2f2f37;
    --text: #f5f5f7;
    --text2: #8c8c9a;
    --accent: #ffa500;
    --accent-glow: rgba(255,165,0,0.3);
    --gold: #ffa500;
    --gold-glow: rgba(255,165,0,0.4);
    --green: #2ecc71;
    --red: #e74c3c;
  }
  .theme-cyberpunk {
    --bg: #0c0005;
    --surface: #19010c;
    --surface2: #2b0317;
    --surface3: #3b0521;
    --border: #4d092e;
    --text: #ffecf5;
    --text2: #a3738e;
    --accent: #ff0055;
    --accent-glow: rgba(255,0,85,0.4);
    --gold: #ff9900;
    --gold-glow: rgba(255,153,0,0.3);
    --green: #00ff66;
    --red: #ff0055;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100vh; position: relative; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .header-balance {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border-radius: 20px; padding: 6px 14px;
    font-weight: 700; font-size: 15px; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.2s ease;
  }
  .header-balance:active { border-color: var(--gold); background: var(--surface3); }
  .header-balance .star { color: var(--gold); }
  
  .header-btn {
    width: 38px; height: 38px; border-radius: 50%; background: var(--surface2);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: all 0.2s ease;
  }
  .header-btn:active { background: var(--surface3); transform: scale(0.95); }

  /* WHEEL AREA */
  .wheel-area {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 12px; position: relative;
  }
  .pointer-wrap {
    position: relative; display: flex; justify-content: center; z-index: 15;
  }
  .pointer {
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 24px solid #fff;
    filter: drop-shadow(0 4px 12px var(--accent-glow));
    margin-bottom: -6px;
  }
  .wheel-outer {
    position: relative; border-radius: 50%;
    background: radial-gradient(circle, #1c1f2f 0%, #0d0f17 100%);
    padding: 10px; border: 4px solid var(--border);
    box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 20px rgba(88,101,242,0.1);
  }
  canvas#wheelCanvas {
    display: block; max-width: 290px; max-height: 290px;
    width: 100%; height: auto; border-radius: 50%;
  }

  /* GAME BAR / STATS */
  .game-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; gap: 10px;
  }
  .bank-display {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border-radius: 24px; padding: 12px 24px;
    font-weight: 800; font-size: 16px; gap: 8px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .bank-display .bank-title { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .bank-display .star { color: var(--gold); font-size: 16px; }

  /* GAME PANEL */
  .game-panel {
    margin: 4px 14px 12px;
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .game-panel-header {
    padding: 10px 16px; text-align: center;
    font-size: 12px; color: var(--text2); font-weight: 600;
    border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.1);
  }
  #playersList { max-height: 180px; overflow-y: auto; }
  .player-row {
    display: flex; align-items: center; padding: 12px 16px; gap: 12px;
    border-bottom: 1px solid var(--border); transition: background 0.2s;
  }
  .player-row:last-child { border-bottom: none; }
  .player-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; flex-shrink: 0;
    border: 1.5px solid var(--border);
  }
  .player-info { flex: 1; min-width: 0; }
  .player-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-chance { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .player-bet { font-weight: 800; font-size: 14px; color: var(--gold); display: flex; align-items: center; gap: 4px; }

  /* BET SECTION */
  .bet-section { padding: 0 14px 20px; display: flex; flex-direction: column; gap: 10px; }
  .bet-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .bet-btn {
    padding: 12px 0; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--text); font-weight: 700; font-size: 13px;
    cursor: pointer; transition: all 0.2s ease; display: flex;
    align-items: center; justify-content: center; gap: 4px;
  }
  .bet-btn.active { border-color: var(--gold); background: rgba(255,165,0,0.12); color: var(--gold); }
  
  .custom-bet-wrap { position: relative; }
  .custom-bet-input {
    width: 100%; padding: 12px 14px; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--gold); font-weight: 800; font-size: 15px;
    text-align: center; outline: none; transition: all 0.2s ease;
  }
  .custom-bet-input:focus { border-color: var(--accent); }
  
  .play-btn {
    width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 14px; color: white;
    font-weight: 700; font-size: 15px; cursor: pointer;
    transition: all 0.2s ease; letter-spacing: 0.5px;
  }
  .play-btn:active { transform: scale(0.98); }
  .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* TRANSACTION BUTTONS */
  .tx-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .tx-btn {
    padding: 10px; border-radius: 10px; font-weight: 600; font-size: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    transition: all 0.2s ease;
  }
  .tx-btn:active { background: var(--surface2); }
  
  /* STATUS BAR */
  .status-bar {
    text-align: center; padding: 6px; font-size: 12px;
    font-weight: 600; background: var(--surface);
    border-radius: 10px; margin: 0 14px 4px;
    border: 1px solid var(--border); transition: all 0.3s ease;
  }
  .status-bar.connected { color: var(--green); }
  .status-bar.waiting { color: var(--gold); }
  .status-bar.spinning { color: #9b59b6; }
  .status-bar.disconnected { color: var(--red); }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 80vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    padding: 24px 20px 32px; border-top: 1px solid var(--border);
    position: relative;
  }
  .modal-overlay.active .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 20px; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: var(--text2);
  }

  /* FORMS IN MODALS */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; }
  .form-input {
    padding: 12px 14px; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
    font-family: inherit; width: 100%;
  }
  .form-input:focus { border-color: var(--accent); }

  /* GAME LOG / CHAT */
  #logList { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 12px; border: 1px solid var(--border); }
  .log-msg { font-size: 13px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.02); padding-bottom: 6px; }
  .log-msg.system { color: var(--text2); font-style: italic; }
  .log-msg.win { color: var(--green); font-weight: 600; }
  .log-msg.join { color: var(--accent); }

  /* WINNER OVERLAY */
  .winner-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
  }
  .winner-overlay.active { opacity: 1; pointer-events: all; }
  .winner-content { text-align: center; padding: 24px; }
  .winner-trophy { font-size: 72px; margin-bottom: 16px; animation: bounce 1.2s infinite; }
  .winner-name { font-size: 26px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
  .winner-amount { font-size: 20px; font-weight: 700; color: white; margin-bottom: 24px; }
  .winner-btn {
    padding: 14px 36px; background: var(--gold); border: none; border-radius: 12px;
    color: #090a0f; font-weight: 800; font-size: 15px; cursor: pointer;
    box-shadow: 0 8px 24px var(--gold-glow); transition: all 0.2s ease;
  }
  .winner-btn:active { transform: scale(0.96); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: all 0.3s ease; z-index: 3000; white-space: nowrap;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; width: 8px; height: 8px; border-radius: 2px;
    animation: confettiFall linear forwards; z-index: 1999;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  /* UTILITY STYLE */
  .star-coin {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; background: var(--gold); border-radius: 50%;
    color: #090a0f; font-weight: 800; font-size: 11px; margin-right: 4px;
  }
</style>
</head>

<script>
// WEB AUDIO SYNTHESIZER FOR WHEEL TICKS
const AudioTick = {
  ctx: null,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  },
  play() {
    try {
      this.init();
      if (this.ctx.state === 'suspended') {
        this.ctx.resume();
      }
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(800, this.ctx.currentTime); // High pitch tick
      osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.05);
      
      gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
      
      osc.start();
      osc.stop(this.ctx.currentTime + 0.05);
    } catch(e) {}
  }
};

const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();
tg?.setHeaderColor('#090a0f');
tg?.setBackgroundColor('#090a0f');

const API = window.location.origin;
const WS_PROTO = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_BASE = `${WS_PROTO}//${window.location.host}`;

// State
let state = {
  user: null,
  balance: 0,
  selectedBet: 100,
  roomId: null,
  ws: null,
  players: [],
  totalBank: 0,
  gameStatus: 'waiting',
  timeLeft: 0,
  isInGame: false,
  animFrame: null,
  wheelRotation: 0,
  isSpinning: false,
  lastTick: 0,
  logs: []
};

const COLORS = ['#FF4757','#2ED573','#1E90FF','#FFA500','#9B59B6','#ECCC68','#FF6B81','#70A1FF'];

// INIT
async function init() {
  const tgUser = tg?.initDataUnsafe?.user;
  if (!tgUser) {
    showToast('❌ Telegram\'dan oching!');
    return;
  }
  try {
    const resp = await api('POST', '/api/user/register', {
      telegram_id: tgUser.id,
      username: tgUser.username || '',
      first_name: tgUser.first_name || '',
      last_name: tgUser.last_name || '',
      photo_url: tgUser.photo_url || ''
    });
    state.user = resp.user;
    state.balance = resp.user.balance;
    updateBalanceDisplay();
    
    const status = resp.user.approval_status || 'pending';
    if (status !== 'approved') {
      showLockedScreen(status);
      return;
    }
    
    // Connect to current room immediately as spectator
    await joinActiveRoomSpectator();
  } catch(e) {
    showToast('❌ Xato: ' + e.message);
  }
}

function showLockedScreen(status) {
  const isPending = status === 'pending';
  document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;background:#090a0f;font-family:'Outfit',sans-serif;">
      <div style="font-size:64px;margin-bottom:20px;">${isPending ? '⏳' : '❌'}</div>
      <h2 style="font-size:22px;font-weight:800;margin-bottom:12px;color:#fff;">
        ${isPending ? 'Hisobingiz tasdiqlanishi kutilmoqda' : 'Kirish so\'rovi rad etilgan'}
      </h2>
      <p style="font-size:14px;color:#9299a9;line-height:1.5;max-width:320px;margin-bottom:28px;">
        ${isPending ? 'Sizning o\'yinga kirish so\'rovingiz qabul qilindi. Admin tasdiqlashi bilanoq o\'yin faollashadi.' : 'Afsuski, tizimga kirish so\'rovingiz admin tomonidan rad etilgan.'}
      </p>
      <button onclick="window.Telegram?.WebApp?.close()" style="padding:14px 28px;background:#181b26;border:1px solid #292d3e;border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;">
        Yopish
      </button>
    </div>
  `;
}

async function joinActiveRoomSpectator() {
  try {
    const data = await api('GET', '/api/game/current');
    state.roomId = data.room_id;
    state.players = data.room.players || [];
    state.totalBank = data.room.total_bank || 0;
    state.gameStatus = data.room.status;
    state.timeLeft = data.room.time_left;
    
    // Apply active theme from settings
    const theme = data.active_theme || 'classic';
    document.documentElement.className = `theme-${theme}`;
    
    // Toggle chat button based on settings
    const chatBtn = document.getElementById('chatBtn');
    if (chatBtn) {
      chatBtn.style.display = data.chat_enabled === '1' ? 'flex' : 'none';
    }
    
    const me = state.players.find(p => p.telegram_id === state.user.telegram_id);
    if (me) {
      state.isInGame = true;
      const btn = document.getElementById('playBtn');
      btn.textContent = '➕ Stavkani oshirish';
      btn.style.background = 'linear-gradient(135deg, var(--gold), #fd9644)';
      btn.style.color = '#000';
    } else {
      state.isInGame = false;
      const btn = document.getElementById('playBtn');
      btn.textContent = '🎮 Stavka qo\'yish';
      btn.style.background = 'linear-gradient(135deg, var(--accent), var(--accent2))';
      btn.style.color = '#fff';
    }
    
    updatePlayersList();
    updateBankDisplay();
    updateGameId(data.room_id, data.room.game_hash);
    drawWheel();
    
    // Instantly connect to WebSocket
    connectWS(data.room_id);
  } catch(e) {
    showToast('❌ Live xonaga ulanib bo\'lmadi');
  }
}

// API HELPER
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: 'Server xatosi' }));
    throw new Error(err.detail || 'Xato');
  }
  return r.json();
}

// WHEEL DRAWING
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

function drawWheel(rotation = state.wheelRotation) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(cx, cy) - 10;
  const innerR = R * 0.38;

  ctx.clearRect(0, 0, W, H);

  const players = state.players;

  if (!players || players.length === 0) {
    // Empty wheel grid drawing
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, 2 * Math.PI);
    ctx.fillStyle = '#141724';
    ctx.fill();
    ctx.strokeStyle = varColor('--border');
    ctx.lineWidth = 4;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
    ctx.fillStyle = '#090a0f';
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Outfit';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('STAVKA', cx, cy - 8);
    ctx.fillStyle = varColor('--text2');
    ctx.fillText('KUTILMOQDA', cx, cy + 10);
    return;
  }

  const total = players.reduce((s, p) => s + p.bet, 0);
  let angle = rotation - Math.PI / 2;

  players.forEach((p, i) => {
    const slice = (p.bet / total) * 2 * Math.PI;
    const color = COLORS[i % COLORS.length];

    // Sector arc
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Dark border line
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, angle, angle + slice);
    ctx.closePath();
    ctx.strokeStyle = '#090a0f';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Avatar / Initials
    if (slice > 0.15) {
      const mid = angle + slice / 2;
      const ax = cx + R * 0.7 * Math.cos(mid);
      const ay = cy + R * 0.7 * Math.sin(mid);
      const avR = Math.min(22, R * 0.13);

      ctx.beginPath();
      ctx.arc(ax, ay, avR, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const initials = (p.first_name || p.username || '?')[0].toUpperCase();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${avR * 0.95}px Outfit`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(initials, ax, ay);
    }

    angle += slice;
  });

  // Center core
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR);
  grad.addColorStop(0, '#1c1f2e');
  grad.addColorStop(1, '#0c0e16');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = varColor('--border');
  ctx.lineWidth = 3;
  ctx.stroke();

  // Draw core text
  ctx.fillStyle = '#fff';
  const centerText = state.gameStatus === 'betting' ? String(state.timeLeft) : String(players.length);
  ctx.font = `bold ${innerR * 0.75}px Outfit`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(centerText, cx, cy);
}

function varColor(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function easeOutQuint(x) {
  return 1 - Math.pow(1 - x, 5);
}

// 1XBET REAL PHYSICS SPINNING
function spinWheel(targetAngleRad, duration, onComplete) {
  state.isSpinning = true;
  state.lastTick = 0;
  const startRotation = state.wheelRotation;
  const extraRotations = Math.PI * 2 * 14;
  const totalAngle = extraRotations + targetAngleRad;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    
    const eased = easeOutQuint(progress);
    state.wheelRotation = startRotation + totalAngle * eased;
    
    // Play tick sound when wheel rotation crosses a 15-degree boundary (24 ticks per turn)
    const tickSize = Math.PI / 12;
    const currentTick = Math.floor(state.wheelRotation / tickSize);
    if (currentTick !== state.lastTick) {
      AudioTick.play();
      state.lastTick = currentTick;
    }
    
    drawWheel(state.wheelRotation);

    if (progress < 1) {
      state.animFrame = requestAnimationFrame(animate);
    } else {
      state.isSpinning = false;
      onComplete && onComplete();
    }
  }
  state.animFrame = requestAnimationFrame(animate);
}

// WEBSOCKET
function connectWS(roomId) {
  if (state.ws) state.ws.close();
  state.roomId = roomId;
  const userId = state.user?.telegram_id;
  const wsUrl = `${WS_BASE}/api/game/ws/${roomId}?telegram_id=${userId}`;
  state.ws = new WebSocket(wsUrl);

  state.ws.onopen = () => updateStatusBar('connected', '🟢 Jonli Efir Ulandi');
  state.ws.onclose = () => {
    updateStatusBar('disconnected', '🔴 Aloqa yo\'qolmoqda... Qayta ulanish');
    setTimeout(() => state.roomId && connectWS(state.roomId), 3000);
  };
  state.ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleWSMessage(msg);
  };
}

function handleWSMessage(msg) {
  switch(msg.action) {
    case 'connected':
    case 'player_joined':
    case 'timer':
      state.players = msg.players || [];
      state.totalBank = msg.total_bank || 0;
      state.gameStatus = msg.status || 'waiting';
      state.timeLeft = msg.time_left || 0;
      updateUI(msg);
      if (msg.action === 'player_joined') {
        const lastP = msg.players[msg.players.length - 1];
        addLog('join', `👤 ${lastP.first_name || 'O\'yinchi'} o'yinga qo'shildi! (⭐${lastP.bet})`);
      }
      break;
    case 'spin_start':
      state.gameStatus = 'spinning';
      state.players = msg.players || [];
      updateStatusBar('spinning', '🎡 Aylanmoqda...');
      updatePlayersList();
      document.getElementById('playBtn').disabled = true;
      addLog('system', '🎡 G\'olib aniqlanmoqda! Baraban aylanishi boshlandi.');
      const targetAngle = (msg.target_angle || 0) * Math.PI / 180;
      spinWheel(targetAngle, msg.spin_duration || 6000, () => {});
      break;
    case 'game_over':
      handleGameOver(msg);
      break;
  }
}

function updateUI(msg) {
  updateBalanceDisplay();
  updateBankDisplay();
  updatePlayersList();
  updateGameId(msg.room_id, msg.game_hash);
  drawWheel();
  
  const btn = document.getElementById('playBtn');
  if (msg.status === 'betting') {
    updateStatusBar('waiting', `⏳ ${msg.time_left}s qoldi...`);
    btn.disabled = false;
    btn.textContent = state.isInGame ? '➕ Stavkani oshirish' : '🎮 Stavka qo\'yish';
    btn.style.background = state.isInGame ? 'linear-gradient(135deg, var(--gold), #fd9644)' : 'linear-gradient(135deg, var(--accent), var(--accent2))';
    btn.style.color = state.isInGame ? '#000' : '#fff';
  } else if (msg.status === 'waiting') {
    updateStatusBar('connected', '👥 O\'yinchi kutilmoqda...');
    btn.disabled = false;
    btn.textContent = state.isInGame ? '➕ Stavkani oshirish' : '🎮 Stavka qo\'yish';
    btn.style.background = state.isInGame ? 'linear-gradient(135deg, var(--gold), #fd9644)' : 'linear-gradient(135deg, var(--accent), var(--accent2))';
  } else if (msg.status === 'spinning' || msg.status === 'finished') {
    btn.disabled = true;
    btn.textContent = '🎡 Aylanmoqda...';
    btn.style.background = 'var(--surface2)';
    btn.style.color = 'var(--text2)';
  }
}

function handleGameOver(msg) {
  state.gameStatus = 'finished';
  state.isInGame = false;

  const winner = msg.winner;
  const myId = state.user?.telegram_id;
  const isWinner = winner?.telegram_id === myId;

  if (isWinner) {
    state.balance += msg.winner_amount || 0;
    updateBalanceDisplay();
  }

  addLog('win', `🏆 G'OLIB: ${winner?.first_name || 'O\'yinchi'}! Bank: ⭐ ${msg.winner_amount.toLocaleString()}`);

  setTimeout(() => {
    showWinner(winner, msg.winner_amount, isWinner);
    launchConfetti();
  }, 500);

  // Reset room after a delay
  setTimeout(() => {
    state.players = [];
    state.roomId = null;
    state.isInGame = false;
    state.gameStatus = 'waiting';
    state.totalBank = 0;
    state.wheelRotation = 0;
    drawWheel();
    updatePlayersList();
    updateBankDisplay();
    document.getElementById('playBtn').disabled = false;
    document.getElementById('playBtn').textContent = '🎮 Stavka qo\'yish';
    document.getElementById('playBtn').style.background = 'linear-gradient(135deg, var(--accent), var(--accent2))';
    document.getElementById('playBtn').style.color = '#fff';
    updateStatusBar('connected', '👥 Yangi o\'yin kutilmoqda...');
    closeWinner();
  }, 8000);
}

// PLACE BET
async function placeBet() {
  if (!state.user) return showToast('❌ Avval kirish kerak');
  
  // Calculate bet amount
  const customVal = parseInt(document.getElementById('customBetInput').value);
  const betAmt = (!isNaN(customVal) && customVal > 0) ? customVal : state.selectedBet;
  
  if (betAmt <= 0) {
    showToast('⚠️ Noto\'g\'ri stavka miqdori');
    return;
  }
  if (state.balance < betAmt) {
    showToast('💸 Balansingiz yetarli emas!');
    return;
  }

  const btn = document.getElementById('playBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Kutmoqda...';
  try {
    const resp = await api('POST', '/api/game/join', {
      telegram_id: state.user.telegram_id,
      room_id: state.roomId,
      bet: betAmt
    });
    state.balance -= betAmt;
    updateBalanceDisplay();
    state.isInGame = true;
    state.roomId = resp.room_id;
    state.players = resp.room.players || [];
    state.totalBank = resp.room.total_bank || 0;
    state.gameStatus = resp.room.status;
    state.timeLeft = resp.room.time_left;
    updatePlayersList();
    updateBankDisplay();
    updateGameId(resp.room_id, resp.room.game_hash);
    drawWheel();
    if (!state.ws || state.ws.readyState !== WebSocket.OPEN || state.roomId !== resp.room_id) {
      connectWS(resp.room_id);
    }
    
    // Clear custom input
    document.getElementById('customBetInput').value = '';
    
    btn.disabled = false;
    btn.textContent = '➕ Stavkani oshirish';
    btn.style.background = 'linear-gradient(135deg, var(--gold), #fd9644)';
    btn.style.color = '#000';
    showToast(`✅ ⭐${betAmt} stavka qo'yildi!`);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = state.isInGame ? '➕ Stavkani oshirish' : '🎮 Stavka qo\'yish';
    showToast('❌ ' + e.message);
  }
}

// WITHDRAWALS & PROMOS Redemptions
async function requestWithdraw() {
  const amt = parseInt(document.getElementById('withdrawAmount').value);
  const details = document.getElementById('withdrawDetails').value.trim();
  if (!amt || amt <= 0 || !details) return showToast('⚠️ Barcha maydonlarni to\'ldiring');
  if (state.balance < amt) return showToast('💸 Hisobingizda mablag\' yetarli emas');
  
  try {
    const r = await api('POST', '/api/user/withdraw', { telegram_id: state.user.telegram_id, amount: amt, details: details });
    state.balance = r.balance;
    updateBalanceDisplay();
    closeModal('withdrawModal');
    showToast('✅ Chiqazish so\'rovi yuborildi!');
    addLog('system', `💸 Chiqazish so'rovi yuborildi: ⭐ ${amt}`);
  } catch(e) { showToast('❌ ' + e.message); }
}

async function redeemPromo() {
  const code = document.getElementById('promoCodeInput').value.trim();
  if (!code) return showToast('⚠️ Promo-kodni kiriting');
  try {
    const r = await api('POST', '/api/user/promo/redeem', { telegram_id: state.user.telegram_id, code: code });
    state.balance = r.balance;
    updateBalanceDisplay();
    closeModal('promoModal');
    showToast(r.message);
    addLog('system', `🎫 Promo-kod faollashtirildi: ${code}`);
  } catch(e) { showToast('❌ ' + e.message); }
}

// UI HELPERS
function updateBalanceDisplay() {
  document.getElementById('balanceDisplay').textContent = (state.balance || 0).toLocaleString();
}
function updateBankDisplay() {
  document.getElementById('bankDisplay').textContent = (state.totalBank || 0).toLocaleString();
}
function updateGameId(roomId, hash) {
  if (roomId) {
    const shortId = roomId.replace('game_', '').slice(-6);
    document.getElementById('gameId').textContent = `Game #${shortId}`;
  }
}
function updatePlayersList() {
  const el = document.getElementById('playersList');
  if (!state.players || state.players.length === 0) {
    el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2);font-size:13px">👥 O'yinchilar yo'q. Birinchi bo'lib qo'shiling!</div>`;
    return;
  }
  const total = state.players.reduce((s, p) => s + p.bet, 0);
  el.innerHTML = state.players.map((p, i) => {
    const chance = total > 0 ? (p.bet / total * 100).toFixed(1) : 0;
    const initials = (p.first_name || p.username || '?')[0].toUpperCase();
    const color = COLORS[i % COLORS.length];
    return `
      <div class="player-row">
        <div class="player-avatar" style="background:${color}15;border-color:${color};color:${color}">
          ${initials}
        </div>
        <div class="player-info">
          <div class="player-name">${escHtml(p.first_name || p.username || 'O\'yinchi')}</div>
          <div class="player-chance">Ehtimollik ${chance}%</div>
        </div>
        <div class="player-bet">⭐ ${p.bet.toLocaleString()}</div>
      </div>`;
  }).join('');
}
function updateStatusBar(type, text) {
  const el = document.getElementById('statusBar');
  el.className = `status-bar ${type}`;
  el.textContent = text;
}

// LOGS
function addLog(type, text) {
  const logList = document.getElementById('logList');
  const el = document.createElement('div');
  el.className = `log-msg ${type}`;
  el.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
  logList.appendChild(el);
  logList.scrollTop = logList.scrollHeight;
}

// WINNER
function showWinner(winner, amount, isMe) {
  const overlay = document.getElementById('winnerOverlay');
  document.getElementById('winnerName').textContent = isMe ? '🏆 G\'OLIB SIZ!' : `🏆 G'OLIB: ${winner?.first_name || 'O\'yinchi'}`;
  document.getElementById('winnerAmount').textContent = `⭐ ${(amount||0).toLocaleString()} Stars`;
  overlay.classList.add('active');
}
function closeWinner() { document.getElementById('winnerOverlay').classList.remove('active'); }

// CONFETTI
function launchConfetti() {
  const colors = ['#ffa500','#5865f2','#2ed573','#ff4757','#9b59b6'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${6+Math.random()*8}px;
        height:${6+Math.random()*8}px;
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration:${2+Math.random()*2}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

// TOAST & SELECT BET
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 2500);
}
function selectBet(amount) {
  state.selectedBet = amount;
  document.getElementById('customBetInput').value = '';
  [100, 500, 2500].forEach(b => {
    document.getElementById(`bet${b}`).classList.toggle('active', b === amount);
  });
}
function clearPresetBetHighlight() {
  [100, 500, 2500].forEach(b => {
    document.getElementById(`bet${b}`).classList.remove('active');
  });
}

function escHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
});
